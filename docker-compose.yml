services:
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  pipeline:
    build: .
    command: python -m src.pipeline
    volumes:
      - ./data/raw:/app/data/raw:ro
      - chroma_data:/app/chroma_db
    depends_on:
      - ollama
    profiles:
      - ingest

  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/app/chroma_db
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama

volumes:
  ollama_data:
  chroma_data:
