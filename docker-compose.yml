# Ollama runs natively on the host (not in Docker) for direct GPU access.
# Dockerized Ollama falls back to CPU-only inference, which is too slow
# for long-prompt probes during security testing.

services:
  pipeline:
    build: .
    command: python -m src.pipeline
    volumes:
      - ./data/raw:/app/data/raw:ro
      - chroma_data:/app/chroma_db
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
    profiles:
      - ingest

  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/app/chroma_db
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434

volumes:
  chroma_data:
